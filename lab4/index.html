<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 4 Index</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
    }

    .card {
      max-width: 640px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    code {
      background: rgba(255, 255, 255, 0.08);
      padding: 0.2rem 0.4rem;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Reliable UDP HTTP Demo</h1>
    <p>This is the default <code>index.html</code> served by the lab HTTP server.</p>
    <p>Try a GET request with:</p>
    <p><code>python -m lab4.http_client GET /index.html --host 127.0.0.1 --port 8080</code></p>
  </main>
</body>
</html>
